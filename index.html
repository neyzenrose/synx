<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SYNX - Video Downloader</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 100%);color:#00FF88;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.container{background:rgba(10,10,10,0.95);border:2px solid #00FFFF;border-radius:15px;padding:40px;width:100%;max-width:500px;box-shadow:0 0 30px rgba(0,255,136,0.2)}.header{text-align:center;margin-bottom:30px}.logo{font-size:48px;margin-bottom:10px}h1{color:#00FFFF;font-size:32px;margin-bottom:5px}.tagline{color:#00FF88;font-size:14px;opacity:0.8}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;color:#00FFFF;font-weight:500}input,select{width:100%;padding:12px;background:#1a1a1a;color:#00FF88;border:1px solid #00FFFF;border-radius:8px;font-size:14px;font-family:inherit}input::placeholder{opacity:0.5}input:focus,select:focus{outline:0;border-color:#00FF88;box-shadow:0 0 10px rgba(0,255,136,0.3)}.button-group{display:flex;gap:10px;margin-top:25px}button{flex:1;padding:14px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all 0.3s ease;text-transform:uppercase;letter-spacing:1px}.btn-download{background:linear-gradient(135deg,#00FF88,#00FFAA);color:#000;box-shadow:0 4px 15px rgba(0,255,136,0.3)}.btn-download:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,255,136,0.5)}.btn-info{background:rgba(0,255,255,0.1);color:#00FFFF;border:1px solid #00FFFF}.btn-info:hover{background:rgba(0,255,255,0.2);box-shadow:0 0 15px rgba(0,255,255,0.3)}.status{margin-top:20px;padding:15px;border-radius:8px;text-align:center;font-size:13px;min-height:20px}.status.success{background:rgba(0,255,136,0.1);color:#00FF88;border-left:4px solid #00FF88}.status.error{background:rgba(255,0,0,0.1);color:#FF6B6B;border-left:4px solid #FF6B6B}.info{margin-top:15px;padding:12px;background:rgba(0,255,255,0.05);border-radius:8px;border-left:3px solid #00FFFF;font-size:12px;color:#00FF88}footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(0,255,255,0.2);color:#00FF88;font-size:12px}</style></head><body><div class="container"><div class="header"><div class="logo">⬇️</div><h1>SYNX</h1><p class="tagline">Get Your Videos & Audio</p></div><div class="form-group"><label for="url">Video/Audio URL</label><input type="text" id="url" placeholder="Paste YouTube, Instagram, TikTok URL..."></div><div class="form-group"><label for="fmt">Format</label><select id="fmt"><option value="mp4">🎬 MP4 (Video)</option><option value="mp3">🎵 MP3 (Audio)</option></select></div><div class="button-group"><button class="btn-download" onclick="download()">📥 DOWNLOAD</button><button class="btn-info" onclick="toggleInfo()">ℹ️ INFO</button></div><div id="status" style="display:none"></div><div id="info" class="info" style="display:none"><strong>How to use:</strong><br>1. Paste a video URL<br>2. Choose format (MP4/MP3)<br>3. Click DOWNLOAD<br><br>Supported: YouTube, Instagram, TikTok, Vimeo & 1000+ sites!</div><footer><p>SYNX © 2024 | v1.2.0</p><p>Powered by yt-dlp</p></footer></div><script>function download(){let url=document.getElementById('url').value.trim();let fmt=document.getElementById('fmt').value;if(!url){showStatus('❌ Please enter a URL','error');return}showStatus('⏳ Processing... (Note: Backend required for actual download)','success')}function showStatus(msg,type){let status=document.getElementById('status');status.textContent=msg;status.className='status '+type;status.style.display='block'}function toggleInfo(){let info=document.getElementById('info');info.style.display=info.style.display==='none'?'block':'none'}</script></body></html>
